version: 2
updates:
- package-ecosystem: pip
  commit-message:
    prefix: Bug 1976221 - deps(pip)
  cooldown:
    default-days: 7
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 99
  allow:
    - dependency-type: all
- package-ecosystem: npm
  commit-message:
    prefix: Bug 1976221 - deps(npm)
  cooldown:
    default-days: 7
  directory: "/"
  schedule:
    interval: monthly
  open-pull-requests-limit: 99
  allow:
    - dependency-type: all
  ignore:
    - update-types:
      # Our package.json allows semver-compatible versions (with ^).
      # This means no major bumps.
      - "version-update:semver-major"
